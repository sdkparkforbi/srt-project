<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SRT 안내소 — AI 안내봇 리포</title>
<meta name="description" content="중요위험이전(SRT) 합성증권화 연구를 쉬운 말로 설명하는 AI 안내봇. 글로 묻거나 아바타와 얼굴 보며 대화하세요." />
<meta property="og:title" content="SRT 안내소 — AI 안내봇 리포" />
<meta property="og:description" content="중요위험이전(SRT) 합성증권화 연구를 쉬운 말로 설명하는 AI 안내봇." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://aiforalab.com/srt/qna/" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<!-- LiveKit JS SDK (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
  :root{--navy:#1d3b6e;--navy2:#16305c;--teal:#0f766e;--ink:#1f2733;--soft:#5d6675;--line:#e3e7ec;--bg:#eef1f5}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.7}
  .wrap{max-width:760px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 1px 40px rgba(20,30,50,.08);display:flex;flex-direction:column}
  header{background:linear-gradient(150deg,var(--navy),var(--navy2));color:#fff;padding:22px clamp(18px,4vw,40px)}
  header .top{display:flex;align-items:center;gap:12px}
  header .ava{width:46px;height:46px;border-radius:50%;background:#fff2;display:grid;place-items:center;font-size:1.5rem}
  header h1{margin:0;font-size:1.15rem}
  header p{margin:2px 0 0;color:#cdddf5;font-size:.83rem}
  header a.home{color:#cdddf5;font-size:.8rem;text-decoration:none}
  .introvid{background:#0b1220;padding:14px clamp(14px,3.5vw,32px) 16px}
  .introvid summary{color:#cdddf5;font-size:.9rem;font-weight:500;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
  .introvid summary::-webkit-details-marker{display:none}
  .introvid video{width:100%;max-height:300px;border-radius:12px;margin-top:12px;background:#000;display:block}
  .tabs{display:flex;background:#f4f6f9;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;border:0;background:none;padding:13px 8px;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--soft);cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{color:var(--navy);border-bottom-color:var(--navy);background:#fff}
  .panel{flex:1;display:none;flex-direction:column;min-height:0}
  .panel.on{display:flex}
  /* 채팅 */
  #log{flex:1;overflow-y:auto;padding:18px clamp(14px,3.5vw,32px);display:flex;flex-direction:column;gap:12px}
  .msg{max-width:84%;padding:10px 14px;border-radius:14px;font-size:.93rem;white-space:pre-wrap;word-break:break-word}
  .msg.u{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:4px}
  .msg.b{align-self:flex-start;background:#f1f4f8;color:var(--ink);border-bottom-left-radius:4px}
  .msg.b.think{color:var(--soft);font-style:italic}
  .sugg{display:flex;flex-wrap:wrap;gap:8px;padding:0 clamp(14px,3.5vw,32px) 10px}
  .sugg button{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:18px;padding:7px 13px;font-size:.82rem;font-family:inherit;cursor:pointer}
  .sugg button:hover{background:#f1f4f8}
  .inbar{display:flex;gap:8px;padding:12px clamp(14px,3.5vw,32px);border-top:1px solid var(--line);background:#fff}
  .inbar input{flex:1;border:1px solid var(--line);border-radius:22px;padding:11px 16px;font-size:.95rem;font-family:inherit;outline:none}
  .inbar input:focus{border-color:var(--navy)}
  .inbar button{border:0;background:var(--navy);color:#fff;border-radius:22px;padding:0 18px;font-size:.95rem;font-family:inherit;cursor:pointer}
  .inbar button:disabled{opacity:.5;cursor:default}
  .micbtn{border:0;background:#0f766e;color:#fff;border-radius:50%;width:44px;min-width:44px;height:44px;font-size:1.15rem;cursor:pointer;padding:0}
  .micbtn.rec{background:#c0392c;animation:vbreath 1s ease-in-out infinite}
  /* 아바타 */
  #ftf{position:relative;flex:1;background:#0b1220;display:flex;flex-direction:column}
  #stage{position:relative;height:clamp(380px,58vh,540px);background:radial-gradient(circle at 50% 38%,#16233a,#0b1220);display:grid;place-items:center;overflow:hidden}
  #video{max-width:min(58%,300px);max-height:56%;width:auto;height:auto;object-fit:contain;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
  #caption{background:#0e1a2c;color:#fff;padding:12px 18px;font-size:.95rem;line-height:1.55;text-align:center;border-top:1px solid #1e2c44;min-height:1.55em;display:none}
  #caption.show{display:block}
  #overlay{position:absolute;inset:0;background:rgba(11,18,32,.92);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:20px}
  #overlay.hidden{display:none}
  #overlay .big{font-size:3rem}
  #count{color:#9db4dd;font-size:.85rem;min-height:1em;opacity:0;transition:opacity .3s}
  #count.show{opacity:1}
  .startbtn{border:0;background:#fff;color:var(--navy);border-radius:26px;padding:13px 26px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer}
  #status{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.5);color:#fff;border-radius:16px;padding:6px 12px;font-size:.78rem;display:none;align-items:center;gap:7px}
  #status.show{display:flex}
  #status .dot{width:8px;height:8px;border-radius:50%;background:#34d399}
  #status.speaking .dot{background:#60a5fa;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .disclaimer{font-size:.74rem;color:var(--soft);text-align:center;padding:8px 16px}
  /* STS 음성 대화 */
  .sts{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px 20px;text-align:center}
  .stsConn{font-size:.8rem;color:var(--soft);display:flex;align-items:center;gap:7px}
  .stsConn .dot{width:8px;height:8px;border-radius:50%;background:#9aa4b2}
  .stsConn .dot.online{background:#34d399}
  .viz{width:130px;height:130px;border-radius:50%;display:grid;place-items:center;font-size:3.2rem;background:radial-gradient(circle,#e8eef7,#d3deef);transition:transform .2s,box-shadow .2s}
  .viz.listening{box-shadow:0 0 0 8px rgba(52,211,153,.18);animation:vbreath 1.4s ease-in-out infinite}
  .viz.speaking{box-shadow:0 0 0 10px rgba(31,107,156,.22);animation:vbreath .7s ease-in-out infinite}
  @keyframes vbreath{50%{transform:scale(1.07)}}
  .stsStatus{font-size:1rem;color:var(--ink);font-weight:500}
  .stsTranscript{min-height:2.6em;max-width:560px;font-size:.92rem;color:var(--soft);line-height:1.6;background:#f4f6f9;border-radius:12px;padding:12px 16px;width:100%;box-sizing:border-box}
  .stsBtn{border:0;background:var(--navy);color:#fff;border-radius:26px;padding:13px 30px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer}
  .stsBtn.stop{background:#c0392c}
  .stsBtn:disabled{opacity:.6;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="top">
      <div class="ava">🤖</div>
      <div style="flex:1">
        <h1>SRT 안내소 · 안내봇 리포</h1>
        <p>중요위험이전(SRT) 연구를 쉬운 말로 설명해 드려요</p>
      </div>
      <a class="home" href="../index.html">← 프로젝트 홈</a>
    </div>
  </header>

  <div class="tabs">
    <button id="tabTtt" class="on" onclick="switchTab('ttt')">💬 글로 묻기</button>
    <button id="tabSts" onclick="switchTab('sts')">🎙️ 음성 대화</button>
    <button id="tabFtf" onclick="switchTab('ftf')">🧑‍💼 아바타와</button>
  </div>

  <!-- TTT -->
  <section id="panelTtt" class="panel on">
    <div id="log"></div>
    <div class="sugg" id="sugg"></div>
    <div class="inbar">
      <input id="q" type="text" placeholder="SRT가 뭔지 물어보세요…" autocomplete="off" />
      <button id="send" onclick="ask()">보내기</button>
    </div>
    <div class="disclaimer">본 안내봇은 투자 권유가 아니라 연구 설명용입니다.</div>
  </section>

  <!-- STS -->
  <section id="panelSts" class="panel">
    <div class="sts">
      <div class="stsConn" id="stsConn"><span class="dot"></span> 대기</div>
      <div class="viz" id="viz">🎙️</div>
      <div class="stsStatus" id="stsStatus">버튼을 눌러 음성으로 대화를 시작하세요</div>
      <div class="stsTranscript" id="stsTranscript"></div>
      <button class="stsBtn" id="stsBtn" onclick="toggleSTS()">음성 대화 시작</button>
      <div id="stsAudio"></div>
      <div class="disclaimer">마이크 권한이 필요해요. 말이 끝나면 리포가 음성으로 답해요(실시간).</div>
    </div>
  </section>

  <!-- FTF -->
  <section id="panelFtf" class="panel">
    <div id="ftf">
      <div id="stage">
        <video id="video" autoplay playsinline></video>
        <div id="status"><span class="dot"></span><span id="statusText">준비됨</span></div>
        <div id="overlay">
          <div class="big">🧑‍💼</div>
          <div id="overlayMsg">아바타와 얼굴을 보며 대화해요</div>
          <div id="count"></div>
          <button class="startbtn" id="startBtn" onclick="startSession()">아바타 시작</button>
        </div>
      </div>
      <div id="caption"></div>
      <div class="inbar">
        <button id="mic2" class="micbtn" onclick="toggleMic()" disabled title="음성으로 말하기">🎤</button>
        <input id="q2" type="text" placeholder="말하거나 입력하세요…" autocomplete="off" disabled />
        <button id="send2" onclick="askAvatar()" disabled>보내기</button>
      </div>
      <div class="disclaimer">🎤 버튼을 누르고 말하면 아바타가 음성으로 답해요. 글로 입력해도 됩니다. (연결 약 10초)</div>
    </div>
  </section>
</div>

<script>
// ================= 공통 =================
var AVATAR_ID = window.AVATAR_ID || '3303593d-4571-486f-a82d-35056b0d2e2c'; // LiveAvatar(음성 설정됨)
var CHAT_URL    = './openai-chat.php';
var TOKEN_URL   = './token.php';
var SESSION_URL = './session.php';
var LK = window.LivekitClient || window.LiveKit || window.livekit;

var history = [];
function esc(s){return s.replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

// OpenAI 답변 받기 (TTT/FTF 공용 두뇌)
function chat(message){
  history.push({role:'user',content:message});
  return fetch(CHAT_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:message,history:history.slice(0,-1)})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d && d.reply){ history.push({role:'assistant',content:d.reply}); }
      return d;
    });
}

// ================= 탭 =================
function switchTab(which){
  if(which!=='sts' && stsActive) stopSTS();
  ['ttt','sts','ftf'].forEach(function(m){
    var t=document.getElementById('tab'+m.charAt(0).toUpperCase()+m.slice(1));
    var p=document.getElementById('panel'+m.charAt(0).toUpperCase()+m.slice(1));
    if(t) t.classList.toggle('on',m===which);
    if(p) p.classList.toggle('on',m===which);
  });
}

// ================= TTT 텍스트 채팅 =================
var logEl=document.getElementById('log');
function bubble(text,who,cls){
  var d=document.createElement('div');
  d.className='msg '+who+(cls?(' '+cls):'');
  d.innerHTML=esc(text);
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight;
  return d;
}
var SUGGESTIONS=['SRT가 뭐예요?','전통적 유동화와 뭐가 달라요?','트렌치가 뭔가요?','왜 자본이 줄어드나요?','이 연구의 핵심 발견은요?','시스템리스크는 왜 문제죠?'];
function renderSugg(){
  var s=document.getElementById('sugg'); s.innerHTML='';
  SUGGESTIONS.forEach(function(q){
    var b=document.createElement('button'); b.textContent=q;
    b.onclick=function(){document.getElementById('q').value=q; ask();};
    s.appendChild(b);
  });
}
function ask(){
  var inp=document.getElementById('q'); var msg=inp.value.trim();
  if(!msg) return;
  inp.value=''; document.getElementById('send').disabled=true;
  bubble(msg,'u');
  document.getElementById('sugg').innerHTML='';
  var think=bubble('리포가 생각하고 있어요…','b','think');
  chat(msg).then(function(d){
    think.remove();
    bubble((d&&d.reply)?d.reply:'죄송해요, 답변을 가져오지 못했어요.','b');
    document.getElementById('send').disabled=false;
  }).catch(function(){
    think.remove(); bubble('연결에 문제가 있었어요. 잠시 후 다시 시도해주세요.','b');
    document.getElementById('send').disabled=false;
  });
}
document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')ask();});
renderSugg();
bubble('안녕하세요! SRT(중요위험이전) 연구를 안내하는 리포예요. 아래 버튼을 누르거나 무엇이든 물어보세요. 🙂','b');

// ================= STS 음성 대화 (OpenAI Realtime + WebRTC) =================
var stsActive=false, stsPC=null, stsDC=null;
function vizState(s){ var v=document.getElementById('viz'); v.classList.remove('listening','speaking'); if(s)v.classList.add(s); }
function toggleSTS(){ if(stsActive) stopSTS(); else startSTS(); }
async function startSTS(){
  var btn=document.getElementById('stsBtn'), st=document.getElementById('stsStatus'), conn=document.getElementById('stsConn');
  btn.textContent='연결 중…'; btn.disabled=true; st.textContent='서버에 연결하고 있어요…';
  try{
    var tr=await fetch('./realtime-token.php',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var td=await tr.json();
    if(!td.client_secret||!td.client_secret.value) throw new Error(td.error||'토큰 발급 실패');
    var pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]}); stsPC=pc;
    pc.onconnectionstatechange=function(){ console.log('[STS] conn',pc.connectionState);
      if(pc.connectionState==='failed'){ st.textContent='연결이 끊겼어요. 다시 시도해 주세요.'; }
      if(pc.connectionState==='connected'){ conn.innerHTML='<span class="dot online"></span> 연결됨'; } };
    var audio=document.createElement('audio'); audio.autoplay=true; document.getElementById('stsAudio').appendChild(audio);
    pc.ontrack=function(e){ audio.srcObject=e.streams[0]; vizState('speaking'); };
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    if(!stream.getAudioTracks().length){ throw new Error('마이크 입력을 찾지 못했어요'); }
    stream.getAudioTracks().forEach(function(t){ t.enabled=true; pc.addTrack(t, stream); });
    var dc=pc.createDataChannel('oai-events'); stsDC=dc;
    dc.onopen=function(){
      // 라이브 세션에 VAD·전사 재적용(임시토큰 설정이 연결에 반영 안 되는 경우 대비)
      try{ dc.send(JSON.stringify({type:'session.update',session:{type:'realtime',
        audio:{input:{turn_detection:{type:'server_vad',threshold:0.5,prefix_padding_ms:300,silence_duration_ms:500,create_response:true},
        transcription:{model:'whisper-1'}}}}})); }catch(x){}
      st.textContent='듣고 있어요… 마이크에 말씀해 보세요'; vizState('listening');
    };
    dc.onmessage=function(e){ try{ handleSTSEvent(JSON.parse(e.data)); }catch(x){} };
    var offer=await pc.createOffer(); await pc.setLocalDescription(offer);
    var sdpRes=await fetch('https://api.openai.com/v1/realtime/calls?model=gpt-realtime',{
      method:'POST', headers:{'Authorization':'Bearer '+td.client_secret.value,'Content-Type':'application/sdp'}, body:offer.sdp });
    var answer=await sdpRes.text();
    await pc.setRemoteDescription({type:'answer',sdp:answer});
    stsActive=true; btn.textContent='대화 종료'; btn.disabled=false; btn.classList.add('stop');
    st.textContent='듣고 있어요…'; conn.innerHTML='<span class="dot online"></span> 연결됨'; vizState('listening');
  }catch(err){ console.error(err); st.textContent='연결에 실패했어요: '+err.message; btn.textContent='음성 대화 시작'; btn.disabled=false; }
}
function handleSTSEvent(ev){
  var st=document.getElementById('stsStatus'), tr=document.getElementById('stsTranscript');
  switch(ev.type){
    case 'input_audio_buffer.speech_started': st.textContent='듣고 있어요…'; vizState('listening'); break;
    case 'input_audio_buffer.speech_stopped': st.textContent='생각하고 있어요…'; vizState(''); break;
    case 'response.created': st.textContent='답변하고 있어요…'; vizState('speaking'); break;
    case 'response.done': st.textContent='듣고 있어요…'; vizState('listening'); break;
    case 'conversation.item.input_audio_transcription.completed': if(ev.transcript) tr.textContent='나: '+ev.transcript; break;
    case 'response.audio_transcript.delta': if(ev.delta){ tr._b=(tr._b||'')+ev.delta; tr.textContent='리포: '+tr._b; } break;
    case 'response.audio_transcript.done': if(ev.transcript) tr.textContent='리포: '+ev.transcript; tr._b=''; break;
    case 'error': console.error('[STS] error',ev.error); st.textContent='오류: '+((ev.error&&ev.error.message)||'알 수 없음'); break;
  }
}
function stopSTS(){
  if(stsPC){ try{ stsPC.getSenders().forEach(function(s){ if(s.track)s.track.stop(); }); }catch(e){} stsPC.close(); stsPC=null; }
  stsDC=null; stsActive=false;
  document.getElementById('stsAudio').innerHTML='';
  var btn=document.getElementById('stsBtn'); btn.textContent='음성 대화 시작'; btn.classList.remove('stop'); btn.disabled=false;
  document.getElementById('stsStatus').textContent='버튼을 눌러 음성으로 대화를 시작하세요';
  document.getElementById('stsConn').innerHTML='<span class="dot"></span> 대기';
  vizState('');
}

// ================= FTF 아바타 (LiveAvatar + LiveKit) =================
var room=null, session=null, ready=false, starting=false;
var keepAliveTimer=null, pendingSpeaks=[], greetingFired=false, greetingTimer=null;
var videoEl=document.getElementById('video');
var overlay=document.getElementById('overlay'), overlayMsg=document.getElementById('overlayMsg'), overlayCount=document.getElementById('count');
var statusEl=document.getElementById('status'), statusText=document.getElementById('statusText');
var captionEl=document.getElementById('caption');

function setCaption(text){ if(!text){captionEl.classList.remove('show');captionEl.textContent='';return;} captionEl.textContent=text; captionEl.classList.add('show'); }
function setOverlay(show,msg){ if(msg)overlayMsg.textContent=msg; overlay.classList.toggle('hidden',!show); }
var countdownTimer=null, CONNECT_ESTIMATE=12;
function startCountdown(total){ stopCountdown(); var left=total; overlayCount.textContent='약 '+left+'초'; overlayCount.classList.add('show');
  countdownTimer=setInterval(function(){left--; if(left>0){overlayCount.textContent='약 '+left+'초';}else{overlayCount.textContent='거의 다 됐어요'; clearInterval(countdownTimer); countdownTimer=null;}},1000); }
function stopCountdown(){ if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;} overlayCount.textContent=''; overlayCount.classList.remove('show'); }
function setStatus(state){ if(!state){statusEl.classList.remove('show');return;} statusEl.classList.add('show'); statusEl.classList.toggle('speaking',state==='speaking'); statusText.textContent=state==='speaking'?'말하는 중':'준비됨'; }
function uuid(){ if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=(Math.random()*16)|0;var v=c==='x'?r:(r&0x3)|0x8;return v.toString(16);}); }

function sendSpeak(text){ if(!room||!room.localParticipant)return;
  var cmd={event_id:uuid(),event_type:'avatar.speak_text',text:text};
  var encoded=new TextEncoder().encode(JSON.stringify(cmd));
  try{ room.localParticipant.publishData(encoded,{reliable:true,topic:'agent-control'}); }catch(e){ console.error(e); } }
function speak(text,isGreeting){ if(!text)return;
  if(!isGreeting){ greetingFired=true; if(greetingTimer){clearTimeout(greetingTimer);greetingTimer=null;} }
  if(!ready){ pendingSpeaks.push(text); return; } sendSpeak(text); }
function flushPending(){ if(!pendingSpeaks.length)return; greetingFired=true; if(greetingTimer){clearTimeout(greetingTimer);greetingTimer=null;}
  var list=pendingSpeaks.slice(); pendingSpeaks=[]; list.forEach(function(t){sendSpeak(t);}); }

function startSession(){
  if(starting||ready)return; starting=true;
  if(!LK){ setOverlay(true,'영상 모듈을 불러오지 못했어요.'); starting=false; return; }
  setOverlay(true,'리포를 준비하고 있어요…'); startCountdown(CONNECT_ESTIMATE);
  fetch(TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({avatar_id:AVATAR_ID,interactivity_type:'CONVERSATIONAL'})})
  .then(function(r){return r.json();})
  .then(function(sess){
    if(!sess||!sess.livekit_url||!sess.livekit_client_token){ throw new Error('세션 생성 실패: '+JSON.stringify(sess)); }
    session=sess; room=new LK.Room({adaptiveStream:true,dynacast:true});
    room.on(LK.RoomEvent.TrackSubscribed,function(track){
      if(track.kind==='video'){ track.attach(videoEl); onAvatarVisible(); }
      else if(track.kind==='audio'){ var a=track.attach(); a.autoplay=true; document.body.appendChild(a); if(a.play)a.play().catch(function(){}); }
    });
    room.on(LK.RoomEvent.DataReceived,function(payload){
      try{ var evt=JSON.parse(new TextDecoder().decode(payload)); var t=evt.event_type||evt.type||'';
        if(t==='avatar.speak_started')setStatus('speaking'); if(t==='avatar.speak_ended')setStatus('ready'); }catch(e){} });
    room.on(LK.RoomEvent.Disconnected,function(){ teardown(false); });
    return room.connect(session.livekit_url,session.livekit_client_token);
  })
  .then(function(){ startKeepAlive(); })
  .catch(function(err){ console.error(err); stopCountdown(); setOverlay(true,'연결에 실패했어요. 잠시 후 다시 시도해주세요.'); starting=false; });
}
function onAvatarVisible(){
  if(ready)return; ready=true; starting=false; stopCountdown(); setOverlay(false); setStatus('ready');
  document.getElementById('q2').disabled=false; document.getElementById('send2').disabled=false; document.getElementById('mic2').disabled=false;
  if(pendingSpeaks.length){ setTimeout(flushPending,600); return; }
  if(!greetingFired){ greetingTimer=setTimeout(function(){ if(greetingFired)return; greetingFired=true;
    var g='안녕하세요, SRT 연구를 안내하는 리포예요. 무엇이든 물어보세요.'; setCaption(g); sendSpeak(g); },1500); }
}
function startKeepAlive(){ stopKeepAlive(); keepAliveTimer=setInterval(function(){ if(!session)return;
  fetch(SESSION_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'keep-alive',session_id:session.session_id})}).catch(function(){}); },60000); }
function stopKeepAlive(){ if(keepAliveTimer){clearInterval(keepAliveTimer);keepAliveTimer=null;} }
function teardown(callStop){ stopKeepAlive();
  if(callStop&&session){ fetch(SESSION_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'stop',session_id:session.session_id,reason:'USER_CLOSED'})}).catch(function(){}); }
  if(greetingTimer){clearTimeout(greetingTimer);greetingTimer=null;} stopCountdown();
  try{ if(room)room.disconnect(); }catch(e){} room=null; session=null; ready=false; starting=false;
  document.getElementById('q2').disabled=true; document.getElementById('send2').disabled=true; document.getElementById('mic2').disabled=true;
  try{ if(recog)recog.stop(); }catch(e){} listening=false; setMicUI(false);
  setStatus(null); setCaption(''); setOverlay(true,'아바타와 얼굴을 보며 대화해요'); }

// 아바타 모드: 음성 입력(Web Speech API) → 두뇌 → 아바타 발화
var recog=null, listening=false;
function setMicUI(on){ var b=document.getElementById('mic2'); if(b)b.classList.toggle('rec',on); }
function toggleMic(){
  if(!ready){ setCaption('먼저 "아바타 시작"을 눌러 연결해 주세요.'); return; }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setCaption('이 브라우저는 음성 인식을 지원하지 않아요. 크롬에서 쓰거나 글로 입력해 주세요.'); return; }
  if(listening){ try{recog&&recog.stop();}catch(e){} return; }
  recog=new SR(); recog.lang='ko-KR'; recog.interimResults=true; recog.maxAlternatives=1; recog.continuous=false;
  var finalText='', lastShown='', submitted=false;
  function submitVoice(q){
    if(submitted) return; q=(q||'').trim(); if(!q){ setCaption('잘 못 들었어요. 다시 말씀해 주세요.'); return; }
    submitted=true; setCaption('나: '+q); setStatus('speaking');
    chat(q).then(function(d){ var r=(d&&d.reply)||'잘 못 알아들었어요.'; setCaption('리포: '+r); speak((d&&(d.ttsReply||d.reply))||r,false); })
      .catch(function(){ var er='연결 문제로 답하지 못했어요. 다시 말씀해 주세요.'; setCaption(er); speak(er,false); });
  }
  listening=true; setMicUI(true); setCaption('🎤 듣고 있어요… 말씀하세요');
  recog.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText+=e.results[i][0].transcript; else interim+=e.results[i][0].transcript;
    }
    lastShown=(finalText+interim).trim();
    if(lastShown) setCaption('나: '+lastShown);
  };
  recog.onerror=function(ev){ listening=false; setMicUI(false);
    setCaption(ev.error==='not-allowed'?'마이크 권한을 허용해 주세요.':(ev.error==='no-speech'?'소리가 안 들렸어요. 🎤를 다시 눌러 말씀해 주세요.':'음성 인식 오류: '+ev.error)); };
  // 인식이 끝나면(말 멈춤) 최종 문장으로 확실히 제출 — final 이벤트 누락 대비
  recog.onend=function(){ listening=false; setMicUI(false); submitVoice(finalText || lastShown); };
  try{ recog.start(); }catch(e){ listening=false; setMicUI(false); setCaption('마이크를 시작할 수 없어요: '+e.message); }
}

// 아바타 모드: 사용자 질문 → openai-chat.php 두뇌 → 아바타가 발화
function askAvatar(){
  var inp=document.getElementById('q2'); var msg=inp.value.trim(); if(!msg)return;
  inp.value=''; setStatus('speaking'); setCaption('…');
  chat(msg).then(function(d){ var r=(d&&d.reply)||'잘 못 알아들었어요.'; setCaption(r); speak((d&&(d.ttsReply||d.reply))||r,false); })
    .catch(function(){ var e='연결에 문제가 있었어요. 다시 물어봐 주세요.'; setCaption(e); speak(e,false); });
}
document.getElementById('q2').addEventListener('keydown',function(e){if(e.key==='Enter')askAvatar();});
window.addEventListener('beforeunload',function(){ teardown(true); if(stsActive)stopSTS(); });
</script>
